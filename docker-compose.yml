# =============================================================================
# Docker Compose — Stackra Frontend
# =============================================================================
#
# Services:
#   app   — Vite production build served by Caddy (port 8080)
#   proxy — Caddy reverse proxy with wildcard subdomain support (port 80)
#
# Usage:
#   docker-compose up --build          # build and start
#   docker-compose up -d               # start in background
#   docker-compose down                # stop
#   docker-compose logs -f app         # view app logs
#
# Multi-tenancy:
#   http://stackra-inc.test              # main app
#   http://acme.stackra-inc.test         # acme tenant
#   http://globex.stackra-inc.test       # globex tenant
#
# =============================================================================

services:
  # ── App — Vite production build ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: vite
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ── Proxy — Caddy with wildcard subdomain support ───────────────────────
  # Only needed for local development with *.stackra-inc.test domains.
  # In production, your load balancer / CDN handles this.
  proxy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./scripts/wildcard-domain/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

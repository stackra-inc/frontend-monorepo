<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <circle cx="950" cy="80" r="180" fill="#38bdf8" opacity="0.03"/>
  <circle cx="1000" cy="120" r="120" fill="#818cf8" opacity="0.04"/>
  <circle cx="200" cy="350" r="150" fill="#c084fc" opacity="0.03"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>
  <!-- Vite lightning + magnifier -->
  <g transform="translate(88, 115)" filter="url(#glow)">
    <path d="M70 5 L45 65 L62 58 L50 115 L90 45 L72 52 Z" fill="url(#iconGrad)" opacity="0.9"/>
    <circle cx="28" cy="88" r="22" fill="none" stroke="#c084fc" stroke-width="2.5"/>
    <line x1="44" y1="104" x2="58" y2="118" stroke="#c084fc" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="240" y="165" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="38" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">@stackra/vite-decorator-discovery</text>
  <text x="240" y="210" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="18" fill="#94a3b8">Build-time decorator discovery and virtual module generation for Vite</text>
  <g transform="translate(240, 240)">
    <rect x="0" y="0" width="80" height="32" rx="6" fill="#f59e0b" opacity="0.12"/>
    <rect x="0" y="0" width="80" height="32" rx="6" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
    <text x="40" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#f59e0b" text-anchor="middle">Vite</text>
    <rect x="96" y="0" width="130" height="32" rx="6" fill="#38bdf8" opacity="0.12"/>
    <rect x="96" y="0" width="130" height="32" rx="6" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
    <text x="161" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#38bdf8" text-anchor="middle">Build-time</text>
    <rect x="242" y="0" width="130" height="32" rx="6" fill="#818cf8" opacity="0.12"/>
    <rect x="242" y="0" width="130" height="32" rx="6" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
    <text x="307" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#818cf8" text-anchor="middle">Virtual Module</text>
    <rect x="388" y="0" width="130" height="32" rx="6" fill="#c084fc" opacity="0.12"/>
    <rect x="388" y="0" width="130" height="32" rx="6" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.3"/>
    <text x="453" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#c084fc" text-anchor="middle">Decorators</text>
  </g>
  <g transform="translate(780, 110)" opacity="0.5">
    <text font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#64748b">
      <tspan x="0" dy="0" fill="#64748b">// vite.config.ts</tspan>
      <tspan x="0" dy="24" fill="#38bdf8">decoratorDiscovery</tspan><tspan fill="#94a3b8">({</tspan>
      <tspan x="20" dy="24" fill="#f59e0b">decorators</tspan><tspan fill="#94a3b8">: [</tspan><tspan fill="#34d399">'@Injectable'</tspan><tspan fill="#94a3b8">,</tspan>
      <tspan x="40" dy="24" fill="#34d399">'@Module'</tspan><tspan fill="#94a3b8">],</tspan>
      <tspan x="20" dy="24" fill="#f59e0b">output</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#34d399">'virtual:registry'</tspan>
      <tspan x="0" dy="24" fill="#94a3b8">})</tspan>
    </text>
  </g>
  <rect x="0" y="397" width="1200" height="3" fill="url(#accent)"/>
  <g transform="translate(1080, 360)">
    <rect x="0" y="0" width="80" height="24" rx="4" fill="#38bdf8" opacity="0.1"/>
    <text x="40" y="16" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="12" fill="#38bdf8" text-anchor="middle">v1.0.0</text>
  </g>
</svg>

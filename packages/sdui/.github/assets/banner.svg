<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <circle cx="950" cy="80" r="180" fill="#38bdf8" opacity="0.03"/>
  <circle cx="1000" cy="120" r="120" fill="#818cf8" opacity="0.04"/>
  <circle cx="200" cy="350" r="150" fill="#c084fc" opacity="0.03"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>
  <!-- Server → UI icon -->
  <g transform="translate(88, 120)" filter="url(#glow)">
    <rect x="5" y="5" width="50" height="36" rx="5" fill="none" stroke="#38bdf8" stroke-width="2"/>
    <line x1="5" y1="18" x2="55" y2="18" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
    <circle cx="14" cy="12" r="3" fill="#38bdf8" opacity="0.7"/>
    <circle cx="24" cy="12" r="3" fill="#818cf8" opacity="0.7"/>
    <line x1="30" y1="41" x2="30" y2="60" stroke="url(#iconGrad)" stroke-width="2"/>
    <polygon points="30,62 22,52 38,52" fill="url(#iconGrad)"/>
    <rect x="5" y="65" width="50" height="50" rx="5" fill="none" stroke="#818cf8" stroke-width="2"/>
    <rect x="12" y="72" width="36" height="8" rx="2" fill="#818cf8" opacity="0.3"/>
    <rect x="12" y="84" width="24" height="8" rx="2" fill="#c084fc" opacity="0.3"/>
    <rect x="12" y="96" width="30" height="8" rx="2" fill="#38bdf8" opacity="0.3"/>
  </g>
  <text x="240" y="178" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="42" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">@stackra/react-sdui</text>
  <text x="240" y="218" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="18" fill="#94a3b8">Server-Driven UI — fetch page definitions, auto-register routes</text>
  <g transform="translate(240, 245)">
    <rect x="0" y="0" width="110" height="32" rx="6" fill="#38bdf8" opacity="0.12"/>
    <rect x="0" y="0" width="110" height="32" rx="6" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
    <text x="55" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#38bdf8" text-anchor="middle">Pages API</text>
    <rect x="126" y="0" width="120" height="32" rx="6" fill="#818cf8" opacity="0.12"/>
    <rect x="126" y="0" width="120" height="32" rx="6" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
    <text x="186" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#818cf8" text-anchor="middle">Auto-routes</text>
    <rect x="262" y="0" width="110" height="32" rx="6" fill="#c084fc" opacity="0.12"/>
    <rect x="262" y="0" width="110" height="32" rx="6" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.3"/>
    <text x="317" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#c084fc" text-anchor="middle">DI Services</text>
  </g>
  <g transform="translate(780, 110)" opacity="0.5">
    <text font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#64748b">
      <tspan x="0" dy="0" fill="#64748b">// Backend returns page config</tspan>
      <tspan x="0" dy="24" fill="#94a3b8">{ </tspan><tspan fill="#f59e0b">path</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#34d399">'/dashboard'</tspan><tspan fill="#94a3b8">,</tspan>
      <tspan x="20" dy="24" fill="#f59e0b">component</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#34d399">'DashboardPage'</tspan><tspan fill="#94a3b8">,</tspan>
      <tspan x="20" dy="24" fill="#f59e0b">services</tspan><tspan fill="#94a3b8">: [</tspan><tspan fill="#38bdf8">StatsService</tspan><tspan fill="#94a3b8">]</tspan>
      <tspan x="0" dy="24" fill="#94a3b8">}</tspan>
    </text>
  </g>
  <rect x="0" y="397" width="1200" height="3" fill="url(#accent)"/>
  <g transform="translate(1080, 360)">
    <rect x="0" y="0" width="80" height="24" rx="4" fill="#38bdf8" opacity="0.1"/>
    <text x="40" y="16" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="12" fill="#38bdf8" text-anchor="middle">v1.0.0</text>
  </g>
</svg>

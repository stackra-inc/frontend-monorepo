<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <circle cx="950" cy="80" r="180" fill="#a78bfa" opacity="0.03"/>
  <circle cx="1000" cy="120" r="120" fill="#38bdf8" opacity="0.04"/>
  <circle cx="200" cy="350" r="150" fill="#818cf8" opacity="0.03"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>
  <!-- Vite lightning bolt icon -->
  <g transform="translate(78, 105)" filter="url(#glow)">
    <polygon points="70,10 30,80 60,80 50,140 90,60 60,60" fill="none" stroke="url(#iconGrad)" stroke-width="2.5" stroke-linejoin="round"/>
    <polygon points="70,10 30,80 60,80 50,140 90,60 60,60" fill="url(#iconGrad)" opacity="0.15"/>
  </g>
  <text x="240" y="178" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="42" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">@stackra / vite plugins</text>
  <text x="240" y="218" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="18" fill="#94a3b8">Build-time plugins for Vite — decorator discovery, ngrok tunnels, QR codes</text>
  <g transform="translate(240, 245)">
    <rect x="0" y="0" width="180" height="32" rx="6" fill="#a78bfa" opacity="0.12"/>
    <rect x="0" y="0" width="180" height="32" rx="6" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
    <text x="90" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#a78bfa" text-anchor="middle">decorator-discovery</text>
    <rect x="196" y="0" width="80" height="32" rx="6" fill="#38bdf8" opacity="0.12"/>
    <rect x="196" y="0" width="80" height="32" rx="6" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
    <text x="236" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#38bdf8" text-anchor="middle">ngrok</text>
    <rect x="292" y="0" width="80" height="32" rx="6" fill="#818cf8" opacity="0.12"/>
    <rect x="292" y="0" width="80" height="32" rx="6" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
    <text x="332" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#818cf8" text-anchor="middle">qrcode</text>
  </g>
  <g transform="translate(780, 110)" opacity="0.5">
    <text font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#64748b">
      <tspan x="0" dy="0" fill="#64748b">// vite.config.ts</tspan>
      <tspan x="0" dy="24" fill="#c084fc">import</tspan><tspan fill="#94a3b8"> { decoratorDiscovery } </tspan>
      <tspan x="0" dy="24" fill="#c084fc">from</tspan><tspan fill="#34d399"> '@stackra/vite-decorator-discovery'</tspan>
      <tspan x="0" dy="24" fill="#c084fc">import</tspan><tspan fill="#94a3b8"> { qrcode } </tspan><tspan fill="#c084fc">from</tspan><tspan fill="#34d399"> '@stackra/vite-plugin-qrcode'</tspan>
      <tspan x="0" dy="24" fill="#94a3b8">plugins: [</tspan><tspan fill="#38bdf8">decoratorDiscovery</tspan><tspan fill="#94a3b8">(), </tspan><tspan fill="#38bdf8">qrcode</tspan><tspan fill="#94a3b8">()]</tspan>
    </text>
  </g>
  <rect x="0" y="397" width="1200" height="3" fill="url(#accent)"/>
</svg>

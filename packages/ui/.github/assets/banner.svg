<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <circle cx="950" cy="80" r="180" fill="#38bdf8" opacity="0.03"/>
  <circle cx="1000" cy="120" r="120" fill="#818cf8" opacity="0.04"/>
  <circle cx="200" cy="350" r="150" fill="#c084fc" opacity="0.03"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>
  <!-- Slot/layout icon: nested boxes with arrows -->
  <g transform="translate(88, 115)" filter="url(#glow)">
    <rect x="0" y="0" width="120" height="120" rx="10" fill="none" stroke="url(#iconGrad)" stroke-width="2.5"/>
    <rect x="14" y="14" width="92" height="28" rx="5" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5" opacity="0.7"/>
    <rect x="14" y="52" width="40" height="54" rx="5" fill="#1e293b" stroke="#818cf8" stroke-width="1.5" opacity="0.7"/>
    <rect x="64" y="52" width="42" height="54" rx="5" fill="#1e293b" stroke="#c084fc" stroke-width="1.5" opacity="0.7"/>
    <text x="60" y="33" font-family="ui-monospace,monospace" font-size="10" fill="#38bdf8" text-anchor="middle" opacity="0.8">slot</text>
    <text x="34" y="82" font-family="ui-monospace,monospace" font-size="10" fill="#818cf8" text-anchor="middle" opacity="0.8">fill</text>
    <text x="85" y="82" font-family="ui-monospace,monospace" font-size="10" fill="#c084fc" text-anchor="middle" opacity="0.8">fill</text>
  </g>
  <text x="240" y="178" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="42" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">@stackra-inc/ts-ui</text>
  <text x="240" y="218" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="18" fill="#94a3b8">Shared UI primitives — slot system, layout, composable patterns</text>
  <g transform="translate(240, 245)">
    <rect x="0" y="0" width="80" height="32" rx="6" fill="#38bdf8" opacity="0.12"/>
    <rect x="0" y="0" width="80" height="32" rx="6" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
    <text x="40" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#38bdf8" text-anchor="middle">Slot</text>
    <rect x="96" y="0" width="96" height="32" rx="6" fill="#818cf8" opacity="0.12"/>
    <rect x="96" y="0" width="96" height="32" rx="6" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
    <text x="144" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#818cf8" text-anchor="middle">SlotFill</text>
    <rect x="208" y="0" width="110" height="32" rx="6" fill="#c084fc" opacity="0.12"/>
    <rect x="208" y="0" width="110" height="32" rx="6" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.3"/>
    <text x="263" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#c084fc" text-anchor="middle">useSlot()</text>
    <rect x="334" y="0" width="110" height="32" rx="6" fill="#34d399" opacity="0.12"/>
    <rect x="334" y="0" width="110" height="32" rx="6" fill="none" stroke="#34d399" stroke-width="1" opacity="0.3"/>
    <text x="389" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#34d399" text-anchor="middle">Composable</text>
  </g>
  <g transform="translate(780, 110)" opacity="0.5">
    <text font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#64748b">
      <tspan x="0" dy="0" fill="#64748b">// Define a slot</tspan>
      <tspan x="0" dy="24" fill="#94a3b8">&lt;</tspan><tspan fill="#38bdf8">Slot</tspan><tspan fill="#94a3b8"> name=</tspan><tspan fill="#34d399">"header.actions"</tspan><tspan fill="#94a3b8"> /&gt;</tspan>
      <tspan x="0" dy="32" fill="#64748b">// Fill it from anywhere</tspan>
      <tspan x="0" dy="24" fill="#94a3b8">&lt;</tspan><tspan fill="#818cf8">SlotFill</tspan><tspan fill="#94a3b8"> name=</tspan><tspan fill="#34d399">"header.actions"</tspan><tspan fill="#94a3b8">&gt;</tspan>
      <tspan x="20" dy="24" fill="#94a3b8">&lt;</tspan><tspan fill="#c084fc">MyButton</tspan><tspan fill="#94a3b8"> /&gt;</tspan>
      <tspan x="0" dy="24" fill="#94a3b8">&lt;/</tspan><tspan fill="#818cf8">SlotFill</tspan><tspan fill="#94a3b8">&gt;</tspan>
    </text>
  </g>
  <rect x="0" y="397" width="1200" height="3" fill="url(#accent)"/>
  <g transform="translate(1080, 360)">
    <rect x="0" y="0" width="80" height="24" rx="4" fill="#38bdf8" opacity="0.1"/>
    <text x="40" y="16" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="12" fill="#38bdf8" text-anchor="middle">v1.0.0</text>
  </g>
</svg>

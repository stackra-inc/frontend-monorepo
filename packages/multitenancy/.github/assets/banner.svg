<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <circle cx="950" cy="80" r="180" fill="#38bdf8" opacity="0.03"/>
  <circle cx="1000" cy="120" r="120" fill="#818cf8" opacity="0.04"/>
  <circle cx="200" cy="350" r="150" fill="#c084fc" opacity="0.03"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>
  <!-- Multi-tenant: stacked buildings -->
  <g transform="translate(88, 115)" filter="url(#glow)">
    <rect x="0" y="40" width="32" height="80" rx="3" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.7"/>
    <rect x="4" y="50" width="8" height="8" rx="1" fill="#38bdf8" opacity="0.5"/>
    <rect x="16" y="50" width="8" height="8" rx="1" fill="#38bdf8" opacity="0.5"/>
    <rect x="4" y="64" width="8" height="8" rx="1" fill="#38bdf8" opacity="0.5"/>
    <rect x="16" y="64" width="8" height="8" rx="1" fill="#38bdf8" opacity="0.5"/>
    <rect x="44" y="20" width="32" height="100" rx="3" fill="none" stroke="url(#iconGrad)" stroke-width="2.5"/>
    <rect x="48" y="30" width="8" height="8" rx="1" fill="#818cf8" opacity="0.6"/>
    <rect x="60" y="30" width="8" height="8" rx="1" fill="#818cf8" opacity="0.6"/>
    <rect x="48" y="44" width="8" height="8" rx="1" fill="#818cf8" opacity="0.6"/>
    <rect x="60" y="44" width="8" height="8" rx="1" fill="#818cf8" opacity="0.6"/>
    <rect x="48" y="58" width="8" height="8" rx="1" fill="#818cf8" opacity="0.6"/>
    <rect x="60" y="58" width="8" height="8" rx="1" fill="#818cf8" opacity="0.6"/>
    <rect x="88" y="50" width="32" height="70" rx="3" fill="none" stroke="#c084fc" stroke-width="2" opacity="0.7"/>
    <rect x="92" y="60" width="8" height="8" rx="1" fill="#c084fc" opacity="0.5"/>
    <rect x="104" y="60" width="8" height="8" rx="1" fill="#c084fc" opacity="0.5"/>
    <rect x="92" y="74" width="8" height="8" rx="1" fill="#c084fc" opacity="0.5"/>
    <rect x="104" y="74" width="8" height="8" rx="1" fill="#c084fc" opacity="0.5"/>
  </g>
  <text x="240" y="178" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="38" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">@stackra/react-multitenancy</text>
  <text x="240" y="218" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="18" fill="#94a3b8">Multi-tenancy for Refine — subdomain, header, domain resolution</text>
  <g transform="translate(240, 245)">
    <rect x="0" y="0" width="110" height="32" rx="6" fill="#38bdf8" opacity="0.12"/>
    <rect x="0" y="0" width="110" height="32" rx="6" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
    <text x="55" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#38bdf8" text-anchor="middle">Subdomain</text>
    <rect x="126" y="0" width="96" height="32" rx="6" fill="#818cf8" opacity="0.12"/>
    <rect x="126" y="0" width="96" height="32" rx="6" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
    <text x="174" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#818cf8" text-anchor="middle">Header</text>
    <rect x="238" y="0" width="96" height="32" rx="6" fill="#c084fc" opacity="0.12"/>
    <rect x="238" y="0" width="96" height="32" rx="6" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.3"/>
    <text x="286" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#c084fc" text-anchor="middle">Domain</text>
    <rect x="350" y="0" width="96" height="32" rx="6" fill="#34d399" opacity="0.12"/>
    <rect x="350" y="0" width="96" height="32" rx="6" fill="none" stroke="#34d399" stroke-width="1" opacity="0.3"/>
    <text x="398" y="21" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#34d399" text-anchor="middle">Refine</text>
  </g>
  <g transform="translate(780, 110)" opacity="0.5">
    <text font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13" fill="#64748b">
      <tspan x="0" dy="0" fill="#38bdf8">defineConfig</tspan><tspan fill="#94a3b8">({</tspan>
      <tspan x="20" dy="24" fill="#f59e0b">mode</tspan><tspan fill="#94a3b8">: TenantMode.</tspan><tspan fill="#38bdf8">HEADER</tspan><tspan fill="#94a3b8">,</tspan>
      <tspan x="20" dy="24" fill="#f59e0b">resolvers</tspan><tspan fill="#94a3b8">: [</tspan><tspan fill="#34d399">'subdomain'</tspan><tspan fill="#94a3b8">,</tspan>
      <tspan x="40" dy="24" fill="#34d399">'router'</tspan><tspan fill="#94a3b8">],</tspan>
      <tspan x="20" dy="24" fill="#f59e0b">baseDomain</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#34d399">'app.com'</tspan>
      <tspan x="0" dy="24" fill="#94a3b8">})</tspan>
    </text>
  </g>
  <rect x="0" y="397" width="1200" height="3" fill="url(#accent)"/>
  <g transform="translate(1080, 360)">
    <rect x="0" y="0" width="80" height="24" rx="4" fill="#38bdf8" opacity="0.1"/>
    <text x="40" y="16" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="12" fill="#38bdf8" text-anchor="middle">v1.0.0</text>
  </g>
</svg>

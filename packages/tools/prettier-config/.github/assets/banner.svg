<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <!-- Accent gradient: sky blue → indigo → purple -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="50%"  style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <!-- Text gradient for package name -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="60%"  style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <!-- Icon glow -->
    <radialGradient id="iconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#38bdf8;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0" />
    </radialGradient>
    <!-- Code block gradient -->
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bgGrad)" rx="12" />

  <!-- Grid pattern overlay -->
  <g opacity="0.06" stroke="#94a3b8" stroke-width="0.5">
    <line x1="60"  y1="0" x2="60"  y2="280" />
    <line x1="120" y1="0" x2="120" y2="280" />
    <line x1="180" y1="0" x2="180" y2="280" />
    <line x1="240" y1="0" x2="240" y2="280" />
    <line x1="300" y1="0" x2="300" y2="280" />
    <line x1="360" y1="0" x2="360" y2="280" />
    <line x1="420" y1="0" x2="420" y2="280" />
    <line x1="480" y1="0" x2="480" y2="280" />
    <line x1="540" y1="0" x2="540" y2="280" />
    <line x1="600" y1="0" x2="600" y2="280" />
    <line x1="660" y1="0" x2="660" y2="280" />
    <line x1="720" y1="0" x2="720" y2="280" />
    <line x1="780" y1="0" x2="780" y2="280" />
    <line x1="840" y1="0" x2="840" y2="280" />
    <line x1="0" y1="40"  x2="900" y2="40"  />
    <line x1="0" y1="80"  x2="900" y2="80"  />
    <line x1="0" y1="120" x2="900" y2="120" />
    <line x1="0" y1="160" x2="900" y2="160" />
    <line x1="0" y1="200" x2="900" y2="200" />
    <line x1="0" y1="240" x2="900" y2="240" />
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="900" height="3" fill="url(#accentGrad)" rx="2" />
  <!-- Bottom accent line -->
  <rect x="0" y="277" width="900" height="3" fill="url(#accentGrad)" rx="2" />

  <!-- ── Formatting / Paintbrush Icon (left side) ── -->
  <!-- Glow halo -->
  <circle cx="100" cy="140" r="70" fill="url(#iconGlow)" />

  <!-- Outer rounded rectangle (representing a code block being formatted) -->
  <rect x="64" y="104" width="72" height="72" rx="10" fill="none" stroke="#38bdf8" stroke-width="1.8" opacity="0.9" />

  <!-- Formatted text lines inside the block -->
  <line x1="76" y1="122" x2="124" y2="122" stroke="#38bdf8" stroke-width="2" opacity="0.7" stroke-linecap="round" />
  <line x1="76" y1="134" x2="116" y2="134" stroke="#818cf8" stroke-width="2" opacity="0.6" stroke-linecap="round" />
  <line x1="76" y1="146" x2="120" y2="146" stroke="#c084fc" stroke-width="2" opacity="0.6" stroke-linecap="round" />
  <line x1="76" y1="158" x2="110" y2="158" stroke="#818cf8" stroke-width="2" opacity="0.5" stroke-linecap="round" />

  <!-- Small indent markers -->
  <circle cx="72" cy="122" r="2" fill="#38bdf8" opacity="0.8" />
  <circle cx="72" cy="134" r="2" fill="#818cf8" opacity="0.7" />
  <circle cx="72" cy="146" r="2" fill="#c084fc" opacity="0.7" />
  <circle cx="72" cy="158" r="2" fill="#818cf8" opacity="0.6" />

  <!-- Sparkle accents (representing auto-formatting magic) -->
  <text x="130" y="112" font-family="monospace" font-size="12" fill="#38bdf8" opacity="0.6">✦</text>
  <text x="56" y="170" font-family="monospace" font-size="10" fill="#c084fc" opacity="0.5">✦</text>

  <!-- ── Main content (center-left) ── -->
  <!-- Package name -->
  <text x="175" y="105" font-family="'Courier New', Courier, monospace" font-size="26" font-weight="700" fill="url(#textGrad)">@stackra/prettier-config</text>

  <!-- Description -->
  <text x="175" y="133" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">Shared Prettier configuration for Stackra packages</text>

  <!-- Feature badges -->
  <!-- Semi badge -->
  <rect x="175" y="148" width="48" height="22" rx="11" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1" />
  <text x="199" y="163" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">Semi</text>

  <!-- Single Quote badge -->
  <rect x="230" y="148" width="96" height="22" rx="11" fill="#1e1b4b" stroke="#818cf8" stroke-width="1" />
  <text x="278" y="163" text-anchor="middle" font-family="monospace" font-size="11" fill="#818cf8">Single Quote</text>

  <!-- Trailing Comma badge -->
  <rect x="333" y="148" width="110" height="22" rx="11" fill="#2e1065" stroke="#c084fc" stroke-width="1" />
  <text x="388" y="163" text-anchor="middle" font-family="monospace" font-size="11" fill="#c084fc">Trailing Comma</text>

  <!-- Width 100 badge -->
  <rect x="450" y="148" width="72" height="22" rx="11" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1" />
  <text x="486" y="163" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">Width 100</text>

  <!-- Version badge -->
  <rect x="175" y="178" width="56" height="20" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1" />
  <text x="203" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">v1.0.4</text>

  <!-- ── Code snippet (right side) ── -->
  <rect x="560" y="30" width="320" height="220" rx="8" fill="url(#codeGrad)" stroke="#334155" stroke-width="1" />
  <!-- Code window dots -->
  <circle cx="580" cy="50" r="5" fill="#ef4444" opacity="0.8" />
  <circle cx="596" cy="50" r="5" fill="#f59e0b" opacity="0.8" />
  <circle cx="612" cy="50" r="5" fill="#22c55e" opacity="0.8" />
  <!-- File label -->
  <text x="700" y="54" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">package.json</text>
  <!-- Divider -->
  <line x1="560" y1="62" x2="880" y2="62" stroke="#334155" stroke-width="1" />

  <!-- Code lines -->
  <text x="576" y="82"  font-family="'Courier New', Courier, monospace" font-size="11" fill="#64748b">// package.json</text>

  <text x="576" y="102" font-family="'Courier New', Courier, monospace" font-size="11" fill="#94a3b8">{</text>

  <text x="576" y="122" font-family="'Courier New', Courier, monospace" font-size="11" fill="#38bdf8">  "prettier"</text>
  <text x="654" y="122" font-family="'Courier New', Courier, monospace" font-size="11" fill="#94a3b8">:</text>

  <text x="576" y="142" font-family="'Courier New', Courier, monospace" font-size="11" fill="#86efac">    "@stackra/prettier-config"</text>

  <text x="576" y="162" font-family="'Courier New', Courier, monospace" font-size="11" fill="#94a3b8">}</text>

  <text x="576" y="190" font-family="'Courier New', Courier, monospace" font-size="11" fill="#64748b">// Or in prettier.config.mjs:</text>

  <text x="576" y="210" font-family="'Courier New', Courier, monospace" font-size="11" fill="#818cf8">import</text>
  <text x="618" y="210" font-family="'Courier New', Courier, monospace" font-size="11" fill="#e2e8f0">config</text>
  <text x="660" y="210" font-family="'Courier New', Courier, monospace" font-size="11" fill="#818cf8">from</text>

  <text x="576" y="226" font-family="'Courier New', Courier, monospace" font-size="11" fill="#38bdf8">  '@stackra/prettier-config'</text>

  <!-- Cursor blink -->
  <rect x="770" y="226" width="7" height="12" fill="#38bdf8" opacity="0.8" rx="1" />
</svg>

# .github/workflows/release.yml — frontend-monorepo
#
# Creates a GitHub Release when a version tag v* is pushed.
# Publishes any public packages in packages/ to npm.
#
# Required secrets:
#   NPM_TOKEN — from https://www.npmjs.com

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "*-v[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: ${{ secrets.NPM_TOKEN != '' }}
        run: |
          for dir in packages/*/; do
            PRIVATE=$(node -e "const p=require('./$dir/package.json'); console.log(p.private || false)")
            if [ "$PRIVATE" = "false" ]; then
              echo "Publishing $dir"
              pnpm publish "./$dir" --access public --no-git-checks
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

# =============================================================================
# 🤖 Dependabot Configuration
# =============================================================================
#
# Automatically creates PRs for dependency updates.
# Runs weekly on Monday mornings.
#
# =============================================================================

version: 2
updates:
  # ── npm dependencies ──────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 15
    commit-message:
      prefix: "⬆️ chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
    groups:
      # Group all @stackra/* config packages together
      stackra-configs:
        patterns:
          - "@stackra/*"
      # Group all testing dependencies together
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "jsdom"
      # Group all build tools together
      build-tools:
        patterns:
          - "tsup"
          - "typescript"
          - "turbo"
    ignore:
      # Don't auto-update React major versions (breaking changes)
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    commit-message:
      prefix: "⬆️ ci"
    labels:
      - "ci"
      - "automated"
